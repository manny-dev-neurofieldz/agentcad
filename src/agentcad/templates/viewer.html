<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${project_name} — AgentCAD</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
${threejs_scripts}
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --text: #e0e0e0; --highlight: #e94560; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
  h1 { color: #fff; margin-bottom: 0.5rem; }
  h2 { color: var(--highlight); margin: 1rem 0 0.5rem; }
  .subtitle { color: #888; margin-bottom: 2rem; }
  .variant { background: var(--card); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
  .gallery { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1rem 0; }
  .render-item { position: relative; }
  .render-item img { max-width: 280px; border-radius: 8px; border: 1px solid #333; }
  .view-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7);
    padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; }
  table.params { border-collapse: collapse; margin: 0.5rem 0; }
  table.params th, table.params td { padding: 4px 12px; border: 1px solid #333; text-align: left; }
  table.params th { background: var(--accent); }
  table.meta { border-collapse: collapse; margin: 1rem 0; }
  table.meta td { padding: 4px 12px; border: 1px solid #333; }
  details { margin: 0.5rem 0; }
  summary { cursor: pointer; color: var(--highlight); font-weight: bold; }
  pre { margin: 0.5rem 0; border-radius: 8px; overflow-x: auto; }
  code { font-size: 0.9rem; }
  .stl-download, .stl-view { display: inline-block; padding: 6px 16px; border-radius: 6px;
    text-decoration: none; font-weight: bold; margin: 0.5rem 0.5rem 0.5rem 0; cursor: pointer;
    font-size: 0.9rem; border: none; }
  .stl-download { background: var(--accent); color: #fff; }
  .stl-download:hover { background: #1a4a80; }
  .stl-view { background: var(--highlight); color: #fff; }
  .stl-view:hover { background: #c73a50; }
  #viewer-container { display: none; width: 100%; height: 500px; background: #111;
    border-radius: 12px; margin: 1rem 0; position: relative; }
  #viewer-container.active { display: block; }
  #viewer-close { position: absolute; top: 10px; right: 14px; background: var(--highlight);
    color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
    font-size: 1.2rem; z-index: 10; }
  .version-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
    padding: 0.75rem 1rem; background: var(--card); border-radius: 8px; }
  .version-bar label { font-weight: bold; color: var(--highlight); }
  .version-bar select { background: var(--accent); color: var(--text); border: 1px solid #444;
    border-radius: 6px; padding: 6px 12px; font-size: 0.95rem; cursor: pointer; }
  .variant { display: none; }
  .variant.active { display: block; }
  .tab-bar { display: flex; gap: 2px; margin: 0.75rem 0 0; border-bottom: 2px solid #333; }
  .tab { background: transparent; color: #888; border: none; padding: 8px 16px;
    cursor: pointer; font-size: 0.9rem; font-weight: bold; border-radius: 6px 6px 0 0;
    transition: all 0.15s; }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .tab.active { color: var(--highlight); border-bottom: 2px solid var(--highlight);
    margin-bottom: -2px; }
  .tab-content { display: none; padding: 1rem 0; }
  .tab-content.active { display: block; }
  .print-table { border-collapse: collapse; margin: 0.5rem 0; width: 100%; max-width: 500px; }
  .print-table th, .print-table td { padding: 6px 14px; border: 1px solid #333; text-align: left; }
  .print-table th { background: var(--accent); width: 40%; }
  .print-table .critical { color: #ff6b6b; font-weight: bold; }
  .notes { background: #0d1b2a; border-radius: 8px; padding: 1rem; margin: 0.5rem 0;
    font-family: system-ui; line-height: 1.6; }
  .notes p { margin: 0.3rem 0; }
  .notes strong { color: var(--highlight); }
  .timestamp { color: #666; font-size: 0.85rem; margin-left: 0.5rem; }
</style>
</head>
<body>
<h1>${project_name}</h1>
<p class="subtitle">Generated by AgentCAD</p>

<details>
<summary>Project Metadata</summary>
<table class="meta"><tbody>${metadata_rows}</tbody></table>
</details>

<div class="version-bar">
  <label for="version-select">Version:</label>
  <select id="version-select" onchange="selectVersion(this.value)"></select>
</div>

<div id="viewer-container">
  <button id="viewer-close" onclick="closeViewer()">&#215;</button>
  <canvas id="viewer-canvas"></canvas>
</div>

${variants_html}

<script>

let scene, camera, renderer, controls, currentMesh;
const container = document.getElementById('viewer-container');
const canvas = document.getElementById('viewer-canvas');

function initViewer() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0x404040, 2));
  const dir1 = new THREE.DirectionalLight(0xffffff, 1.5);
  dir1.position.set(1, 1, 1);
  scene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0x8888ff, 0.8);
  dir2.position.set(-1, -0.5, -1);
  scene.add(dir2);

  (function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); })();
}

function showMesh(geometry) {
  container.classList.add('active');
  if (!renderer) initViewer();
  if (currentMesh) scene.remove(currentMesh);
  geometry.computeVertexNormals();
  currentMesh = new THREE.Mesh(geometry,
    new THREE.MeshPhongMaterial({ color: 0x4488cc, specular: 0x222222, shininess: 40 }));
  const center = new THREE.Vector3();
  geometry.computeBoundingBox();
  geometry.boundingBox.getCenter(center);
  currentMesh.position.sub(center);
  scene.add(currentMesh);
  const size = geometry.boundingBox.getSize(new THREE.Vector3());
  const d = Math.max(size.x, size.y, size.z);
  camera.position.set(d * 1.5, d * 1.2, d * 1.5);
  controls.target.set(0, 0, 0);
  controls.update();
}

window.loadSTLData = function(id) {
  const el = document.getElementById('stl-data-' + id);
  if (!el) return;
  const b64 = el.textContent;
  const bin = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  showMesh(new THREE.STLLoader().parse(bin.buffer));
};

window.loadSTL = function(path) {
  new THREE.STLLoader().load(path, showMesh);
};

window.closeViewer = function() { container.classList.remove('active'); };

// Tab switching within a variant
window.switchTab = function(btn, tabName) {
  const variant = btn.closest('.variant');
  variant.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  variant.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  variant.querySelector('[data-tab="' + tabName + '"]').classList.add('active');
};

// Version selector
window.selectVersion = function(idx) {
  document.querySelectorAll('.variant').forEach((el, i) => {
    el.classList.toggle('active', i === parseInt(idx));
  });
  closeViewer();
};

// Initialize: populate selector, show first (latest)
document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('version-select');
  const variants = document.querySelectorAll('.variant');
  variants.forEach((el, i) => {
    const name = el.querySelector('h2')?.textContent || ('v' + (i + 1));
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  if (variants.length > 0) {
    sel.value = '0';
    selectVersion('0');
  }

  // Render markdown in notes blocks
  document.querySelectorAll('.notes-raw').forEach(el => {
    const md = el.textContent;
    // Simple markdown: **bold**, *italic*, `code`, newlines
    let html = md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$$1</em>')
      .replace(/`(.+?)`/g, '<code>$$1</code>')
      .replace(/\n/g, '<br>');
    el.innerHTML = html;
    el.classList.remove('notes-raw');
    el.classList.add('notes');
  });
});
</script>
<script>hljs.highlightAll();</script>
</body>
</html>
